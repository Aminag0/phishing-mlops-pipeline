# PIPELINE DEFINITION
# Name: phishing-mlops-kubeflow-pipeline
# Description: Kubeflow-compatible pipeline for phishing website detection MLOps workflow
components:
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
  comp-train-phishing-model:
    executorLabel: exec-train-phishing-model
deploymentSpec:
  executors:
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model():\n    print(\"Starting Kubeflow pipeline component:\
          \ evaluate_model\")\n    print(\"Evaluation metrics: accuracy, precision,\
          \ recall, F1-score, ROC-AUC\")\n\n"
        image: python:3.11-slim
    exec-train-phishing-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_phishing_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'scikit-learn'\
          \ 'xgboost' 'joblib'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_phishing_model():\n    import pandas as pd\n    import\
          \ joblib\n    from pathlib import Path\n\n    from sklearn.model_selection\
          \ import train_test_split\n    from sklearn.metrics import accuracy_score,\
          \ precision_score, recall_score, f1_score, roc_auc_score\n    from xgboost\
          \ import XGBClassifier\n\n    print(\"Starting Kubeflow pipeline component:\
          \ train_phishing_model\")\n\n    data_path = Path(\"data/processed/uci_phishing_processed.csv\"\
          )\n\n    # In real Kubeflow deployment, dataset would come from PVC/object\
          \ storage.\n    # This component represents the pipeline training stage.\n\
          \    print(\"Dataset expected path:\", data_path)\n\n    print(\"Pipeline\
          \ stages:\")\n    print(\"1. Load UCI phishing dataset\")\n    print(\"\
          2. Split train/test\")\n    print(\"3. Train tuned XGBoost model\")\n  \
          \  print(\"4. Evaluate accuracy, precision, recall, F1, ROC-AUC\")\n   \
          \ print(\"5. Save model artifact\")\n\n"
        image: python:3.11-slim
pipelineInfo:
  description: Kubeflow-compatible pipeline for phishing website detection MLOps workflow
  name: phishing-mlops-kubeflow-pipeline
root:
  dag:
    tasks:
      evaluate-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - train-phishing-model
        taskInfo:
          name: evaluate-model
      train-phishing-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-phishing-model
        taskInfo:
          name: train-phishing-model
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
