name: Phishing MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install pytest httpx

      - name: Run API tests
        env:
          PYTHONPATH: .
        run: |
          pytest

      - name: Build Docker image
        run: |
          docker build -t phishing-mlops-api:latest .

      - name: Verify Docker image
        run: |
          docker images | grep phishing-mlops-api